services:

  server:
    build: ./server
    ports:
      - "4242:4242"
    networks:
      - cig-nexus

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      WS_PORT: 8080
      TCP_HOST: server
      TCP_PORT: 4242
    depends_on:
      - server
    networks:
      - cig-nexus

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: ws://localhost:8080
    depends_on:
      - gateway
    networks:
      - cig-nexus

networks:
  cig-nexus:
    driver: bridge
